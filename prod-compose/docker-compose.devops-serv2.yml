services:
  prometheus:
    build:
      dockerfile: ./Dockerfile
      context: ../monitoring/prometheus
    image: prometheus_image
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
  grafana:
    build:
      dockerfile: ./Dockerfile
      context: ../monitoring/grafana
    image: grafana_image
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - /home/github/chirp/grafana-storage:/var/lib/grafana
  
  loki:
    image: grafana/loki:3.6.7
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - /home/github/chirp/logging/loki:/etc/loki
      - /home/github/chirp/loki-data/loki:/loki
    command: -config.file=/etc/loki/loki-config.yml

  # ---------------------------------------------------------------------------
  # SonarQube — self-hosted code quality & security analysis server
  #
  # First-time setup:
  #   1. After deploying, visit http://<SERV2_IP>:9000
  #   2. Log in with admin / admin and immediately change the password
  #   3. Create a new project (manually or via GitHub import)
  #   4. Generate a Project Analysis Token under My Account > Security
  #   5. Add the token as SONAR_TOKEN in GitHub secrets (see secrets checklist)
  #
  # The sonarqube_data / sonarqube_logs / sonarqube_extensions volumes persist
  # state across container restarts and image upgrades.
  # ---------------------------------------------------------------------------
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SONAR_DB_USER}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER} -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_db_data: