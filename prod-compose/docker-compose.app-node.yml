services:
  cheep:
    image: rasmusachr/minitwit:latest
    container_name: cheep
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://*:8080
      - Logging__Console__IncludeScopes=false
      - ConnectionStrings__DefaultConnection=Host=${POSTGRES_PROD_HOST:-db};Database=${POSTGRES_PROD_DB};Username=${POSTGRES_PROD_USER};Password=${POSTGRES_PROD_PASSWORD}
    ports:
      - "10.0.0.4:8080:8080"
    labels:
      logging: "promtail"

  promtail:
    image: grafana/promtail:3.6.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ../logging/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
