name: CI - Build and Test

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_call:  # allows other workflows to call this one
  workflow_dispatch:

jobs:
  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Cache NuGet packages to speed up subsequent runs
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/Chirp.Web/Chirp.Web.csproj

      - name: Build Web
        run: dotnet build src/Chirp.Web/Chirp.Web.csproj --no-restore --configuration Release

  unit_test:
    needs: build_web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore test/Chirp.TestUnit/Chirp.TestUnit.csproj

      - name: Run Unit Tests
        run: dotnet test test/Chirp.TestUnit/Chirp.TestUnit.csproj --no-restore --verbosity normal

  integration_test:
    needs: build_web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore test/Chirp.TestIntegration/Chirp.TestIntegration.csproj

      - name: Run Integration Tests
        run: dotnet test test/Chirp.TestIntegration/Chirp.TestIntegration.csproj --no-restore --verbosity normal

  e2e_test:
    needs: build_web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore test/Chirp.TestE2E/Chirp.TestE2E.csproj

      - name: Build E2E Tests
        run: dotnet build test/Chirp.TestE2E/Chirp.TestE2E.csproj --no-restore

      - name: Install Playwright browsers
        run: pwsh test/Chirp.TestE2E/bin/Debug/net10.0/playwright.ps1 install --with-deps

      - name: Run E2E Tests
        run: dotnet test test/Chirp.TestE2E/Chirp.TestE2E.csproj --no-restore --filter "Category=End2End" --verbosity normal

  sonarqube:
    needs: [unit_test, integration_test, e2e_test]
    runs-on: ubuntu-latest
    continue-on-error: true  # remove this line to block CI on quality gate failure
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install coverlet
        run: dotnet tool install --global coverlet.console

      - name: SonarQube Begin
        env:
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /o:"$SONAR_ORG" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.qualitygate.wait=false

      
      - name: Restore dependencies
        run: dotnet restore Chirp.sln

      - name: Build (wrapped by SonarScanner)
        run: dotnet build Chirp.sln

      - name: Run unit tests with coverage
        run: |
          mkdir -p coverage
          dotnet test test/Chirp.TestUnit/Chirp.TestUnit.csproj \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=opencover \
          /p:CoverletOutput=$(pwd)/coverage/coverage.opencover.xml \
          /p:DeterministicSourcePaths=true

      - name: See coverage report for workflow debugging.
        run: find . -name "coverage.opencover.xml" -print

      - name: Run pwd for debugging
        run: pwd

      - name: Run ls in pwd dir
        run: ls

      - name: Run ls in coverage
        run: ls coverage

      - name: SonarQube End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
  
  codacy:
    needs: build_web
    runs-on: ubuntu-latest
    continue-on-error: true  # remove this line if we want to block CI on Codacy failure
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          # upload: true          # Uncomment if we want to upload results to Codacy dashboard
          # fail-if-incomplete: true  # Uncomment if we want to block CI if analysis is incomplete
