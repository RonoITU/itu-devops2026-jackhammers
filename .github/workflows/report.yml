name: Build Report PDF

on:
  push:
    branches:
      - main
    paths:
      - 'report/**'
  pull_request:
    paths:
      - 'report/**'
  workflow_dispatch:

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    container:
      image: pandoc/latex:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        run: |
          mkdir -p report/build
          pandoc report/report.md \
            --from markdown \
            --to pdf \
            --output report/build/BSc_group_m.pdf \
            --pdf-engine=xelatex \
            --resource-path=report \
            -V geometry:margin=2.5cm \
            -V fontsize=11pt \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: BSc_group_m
          path: report/build/BSc_group_m.pdf
          retention-days: 90

  commit_pdf:
    needs: build_pdf
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download built PDF
        uses: actions/download-artifact@v4
        with:
          name: BSc_group_m
          path: report/build

      - name: Commit PDF to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report/build/BSc_group_m.pdf
          git diff --staged --quiet || git commit -m "ci: rebuild report PDF"
          git push
