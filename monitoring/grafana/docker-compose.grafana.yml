services:
  grafana:
    build:
      dockerfile: ./Dockerfile
    image: grafana_image
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage: { }
  
networks:
  monitoring:
    external: true